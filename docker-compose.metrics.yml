services:
  prometheus:
    image: prom/prometheus:latest
    container_name: backend_php_slim_prometheus
    volumes:
      - ./infra/metrics/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - app-network

  grafana:
    image: grafana/grafana:latest
    container_name: backend_php_slim_grafana
    volumes:
      - ./infra/metrics/grafana/provisioning:/etc/grafana/provisioning
      - grafana_data:/var/lib/grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus
    networks:
      - app-network

networks:
  app-network:
    external: true
    name: backend-php-slim_app-network

volumes:
  prometheus_data:
  grafana_data:
