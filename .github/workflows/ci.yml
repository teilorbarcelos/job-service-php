name: CI

on:
  push:
    branches: [ develop, main ]
  pull_request:
    branches: [ develop, main ]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.3'
        extensions: pdo_sqlite, pcntl, sockets
        coverage: pcov

    - name: Install Dependencies
      run: composer install --prefer-dist --no-progress --ignore-platform-req=ext-pcntl

    - name: Run Lint (PHPStan)
      run: vendor/bin/phpstan analyse src --memory-limit=-1

    - name: Run Tests
      env:
        APP_ENV: testing
        DB_DRIVER: sqlite
        DB_DATABASE: ":memory:"
        LOG_LEVEL: error
        MESSAGING_ENABLED: false
      run: vendor/bin/phpunit --coverage-text --coverage-clover coverage/clover.xml

    - name: Check Coverage
      run: php scripts/check-coverage.php

    - name: Build Docker Image
      run: docker build -t job-service-php .
